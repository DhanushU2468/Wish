<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Varsha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1b0a18,#3d1028,#5c1738);
  color:white;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:5rem;
  font-family:'Dancing Script',cursive;
  color:#ffd6e0;
  text-shadow:0 0 20px rgba(255,105,180,.7);
}

.hero p{
  max-width:600px;
  margin-top:20px;
  font-size:1.1rem;
  color:#f5d7df;
}

.music-btn{
  margin-top:30px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:#ff4f8b;
  color:white;
  font-size:1rem;
}

.heart{
  position:fixed;
  color:#ff6b9d;
  animation:floatUp 6s linear infinite;
  pointer-events:none;
}

@keyframes floatUp{
  from{
    transform:translateY(100vh);
    opacity:1;
  }
  to{
    transform:translateY(-100px);
    opacity:0;
  }
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="perfect.mp3" type="audio/mpeg">
</audio>

<section class="hero">
  <h1>Varsha ❤️</h1>

  <p>
    Every heartbeat, every smile, every beautiful memory
    reminds me how lucky I am to know you.
  </p>

  <button class="music-btn" onclick="toggleMusic()">
    🎵 Play Perfect
  </button>

  <p style="margin-top:30px;">
    With love,<br>
    <strong>Karthik</strong>
  </p>
</section>

<script>
const music=document.getElementById('bgMusic');

function toggleMusic(){
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
}

function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(20+Math.random()*30)+'px';

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);
}

setInterval(createHeart,500);
</script>

</body>
</html>
